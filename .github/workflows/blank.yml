# 这是一个帮助您入门操作的基本工作流

name: CI

# 控制工作流何时运行
在:
  # 在推送或拉取请求事件时触发工作流，但仅针对“main”分支
推送:
分支: [ "main" ]
拉取请求:
分支: [ "main" ]

  # 允许您从“操作”选项卡手动运行此工作流
工作流调度:

# 一个工作流运行由一个或多个作业组成，这些作业可以按顺序或并行运行
作业:
  # 此工作流包含一个名为“构建”的单个作业
构建:
    # 作业将在哪种类型的运行器上运行
运行于: ubuntu-latest

    # 步骤代表将作为作业一部分执行的一系列任务
步骤:
      # 在$GITHUB_WORKSPACE下检出您的仓库，以便您的作业可以访问它
      - 用途: actions/checkout@v4

      # 使用运行器 shell 运行单个命令
      - 名称: 运行一行脚本
        run: echo Hello, world!

      # 使用运行器 shell 运行一组命令
      - 名称: 运行多行脚本
运行: |
echo 添加其他操作以进行构建，
          echo test, and deploy your project.
